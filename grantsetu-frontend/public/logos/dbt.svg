<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <defs>
    <linearGradient id="dbtGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0288D1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="80" rx="8" fill="white"/>
  <rect x="0" y="0" width="6" height="80" rx="3" fill="url(#dbtGrad)"/>
  <!-- DNA double helix simplified -->
  <g transform="translate(24,40)">
    <!-- Left strand -->
    <path d="M-8,-18 C-2,-12 2,-6 -2,0 C-6,6 -2,12 4,18" fill="none" stroke="#1565C0" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Right strand -->
    <path d="M8,-18 C2,-12 -2,-6 2,0 C6,6 2,12 -4,18" fill="none" stroke="#0288D1" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Cross bars -->
    <line x1="-6" y1="-12" x2="6" y2="-12" stroke="#1565C0" stroke-width="1.5"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#1565C0" stroke-width="1.5"/>
    <line x1="-6" y1="12" x2="6" y2="12" stroke="#1565C0" stroke-width="1.5"/>
  </g>
  <text x="48" y="32" font-family="Arial Black, sans-serif" font-weight="900" font-size="22" fill="#1565C0" letter-spacing="2">DBT</text>
  <text x="48" y="50" font-family="Arial, sans-serif" font-size="8.5" fill="#555" letter-spacing="0.3">Department of</text>
  <text x="48" y="62" font-family="Arial, sans-serif" font-size="8.5" fill="#555" letter-spacing="0.3">Biotechnology</text>
</svg>
