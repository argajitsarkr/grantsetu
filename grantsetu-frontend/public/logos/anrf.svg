<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <defs>
    <linearGradient id="anrfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E83E3E;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background pill -->
  <rect width="200" height="80" rx="8" fill="white"/>
  <!-- Accent bar -->
  <rect x="0" y="0" width="6" height="80" rx="3" fill="url(#anrfGrad)"/>
  <!-- Atom icon -->
  <g transform="translate(22,40)">
    <circle cx="0" cy="0" r="4" fill="#FF6B35"/>
    <ellipse cx="0" cy="0" rx="14" ry="6" fill="none" stroke="#FF6B35" stroke-width="1.5" transform="rotate(0)"/>
    <ellipse cx="0" cy="0" rx="14" ry="6" fill="none" stroke="#FF6B35" stroke-width="1.5" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="14" ry="6" fill="none" stroke="#FF6B35" stroke-width="1.5" transform="rotate(120)"/>
  </g>
  <!-- Text -->
  <text x="46" y="32" font-family="Arial Black, sans-serif" font-weight="900" font-size="22" fill="#FF6B35" letter-spacing="2">ANRF</text>
  <text x="46" y="50" font-family="Arial, sans-serif" font-size="8.5" fill="#555" letter-spacing="0.3">Anusandhan National</text>
  <text x="46" y="62" font-family="Arial, sans-serif" font-size="8.5" fill="#555" letter-spacing="0.3">Research Foundation</text>
</svg>
