  <text x="48" y="32" font-family="Arial Black, sans-serif" font-weight="900" font-size="22" fill="#2E7D32" letter-spacing="1">AYUSH</text>
  <text x="48" y="50" font-family="Arial, sans-serif" font-size="8" fill="#555" letter-spacing="0.3">Ministry of Ayurveda, Yoga,</text>
  <text x="48" y="62" font-family="Arial, sans-serif" font-size="8" fill="#555" letter-spacing="0.3">Unani, Siddha &amp; Homeopathy</text>
