<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <defs>
    <linearGradient id="ayushGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66BB6A;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="80" rx="8" fill="white"/>
  <rect x="0" y="0" width="6" height="80" rx="3" fill="url(#ayushGrad)"/>
  <!-- Lotus icon -->
  <g transform="translate(24,40)">
    <!-- Petals -->
    <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#2E7D32" opacity="0.9" transform="rotate(0)"/>
    <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#388E3C" opacity="0.8" transform="rotate(45)"/>
    <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#43A047" opacity="0.7" transform="rotate(90)"/>
    <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#388E3C" opacity="0.8" transform="rotate(135)"/>
    <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#2E7D32" opacity="0.9" transform="rotate(180)"/>
    <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#388E3C" opacity="0.8" transform="rotate(225)"/>
    <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#43A047" opacity="0.7" transform="rotate(270)"/>
    <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#388E3C" opacity="0.8" transform="rotate(315)"/>
    <circle cx="0" cy="0" r="5" fill="#FDD835"/>
